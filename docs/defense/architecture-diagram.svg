<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="880" fill="#ffffff"/>

  <!-- Trust boundary -->
  <rect x="40" y="70" width="1000" height="740" rx="18" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="12 8"/>
  <text x="64" y="104" font-size="17" font-weight="bold" fill="#64748b" letter-spacing="1.5">TRUST BOUNDARY — SINGLE VM · DOCKER COMPOSE · CADDY TLS</text>

  <!-- OpenEMR -->
  <rect x="80" y="150" width="300" height="230" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="230" y="185" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">OpenEMR</text>
  <text x="230" y="210" font-size="14" fill="#475569" text-anchor="middle">untouched — the single system of record</text>
  <text x="230" y="230" font-size="14" fill="#475569" text-anchor="middle">(clinical data, audit log, user roles)</text>
  <!-- Embedded panel -->
  <rect x="100" y="250" width="260" height="106" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="230" y="278" font-size="16" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Embedded React panel</text>
  <text x="230" y="300" font-size="14" fill="#475569" text-anchor="middle">brief · scan toggle · chat</text>
  <text x="230" y="320" font-size="13" fill="#64748b" text-anchor="middle">prototype design system</text>
  <text x="230" y="338" font-size="13" fill="#64748b" text-anchor="middle">(Tailwind / shadcn)</text>

  <!-- Sidecar -->
  <rect x="520" y="150" width="320" height="150" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="680" y="185" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Sidecar service</text>
  <text x="680" y="210" font-size="15" fill="#475569" text-anchor="middle">Node.js + Fastify</text>
  <text x="680" y="234" font-size="14" fill="#475569" text-anchor="middle">Zod schemas = API &amp; tool contracts</text>
  <text x="680" y="258" font-size="14" fill="#475569" text-anchor="middle">agent loop · citation gate · risk calculators</text>
  <text x="680" y="282" font-size="13" fill="#64748b" text-anchor="middle">/health · /ready · correlation IDs</text>

  <!-- Anthropic API (outside boundary) -->
  <rect x="1120" y="150" width="235" height="180" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2.5"/>
  <text x="1237" y="185" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">Anthropic API</text>
  <rect x="1190" y="196" width="95" height="26" rx="13" fill="#15803d"/>
  <text x="1237" y="214" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">under BAA</text>
  <text x="1237" y="248" font-size="14" fill="#475569" text-anchor="middle">Claude Sonnet 5</text>
  <text x="1237" y="266" font-size="13" fill="#64748b" text-anchor="middle">deep reader (preparation)</text>
  <text x="1237" y="292" font-size="14" fill="#475569" text-anchor="middle">Claude Haiku 4.5</text>
  <text x="1237" y="310" font-size="13" fill="#64748b" text-anchor="middle">fast responder (chat)</text>

  <!-- Stores row -->
  <rect x="100" y="490" width="270" height="110" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="235" y="520" font-size="17" font-weight="bold" fill="#0f172a" text-anchor="middle">PostgreSQL fact store</text>
  <text x="235" y="544" font-size="13" fill="#475569" text-anchor="middle">derived view — wipeable,</text>
  <text x="235" y="562" font-size="13" fill="#475569" text-anchor="middle">rebuildable from the record</text>
  <text x="235" y="584" font-size="13" fill="#64748b" text-anchor="middle">pgvector installed, out of hot path</text>

  <rect x="420" y="490" width="240" height="110" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="540" y="520" font-size="17" font-weight="bold" fill="#0f172a" text-anchor="middle">BullMQ on Redis</text>
  <text x="540" y="544" font-size="13" fill="#475569" text-anchor="middle">waiting-room preparation queue</text>
  <text x="540" y="562" font-size="13" fill="#475569" text-anchor="middle">check-in → job; workers scale</text>
  <text x="540" y="584" font-size="13" fill="#64748b" text-anchor="middle">never blocks the EHR</text>

  <rect x="710" y="490" width="250" height="110" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="835" y="520" font-size="17" font-weight="bold" fill="#0f172a" text-anchor="middle">Object storage</text>
  <text x="835" y="544" font-size="13" fill="#475569" text-anchor="middle">GCS / S3-compatible</text>
  <text x="835" y="562" font-size="13" fill="#475569" text-anchor="middle">scan files, pre-fetched per visit</text>
  <text x="835" y="584" font-size="13" fill="#64748b" text-anchor="middle">clinical links live in fact store</text>

  <!-- Langfuse -->
  <rect x="420" y="670" width="240" height="100" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="540" y="700" font-size="17" font-weight="bold" fill="#0f172a" text-anchor="middle">Langfuse</text>
  <text x="540" y="724" font-size="13" fill="#475569" text-anchor="middle">self-hosted observability —</text>
  <text x="540" y="742" font-size="13" fill="#475569" text-anchor="middle">traces never leave the boundary</text>

  <!-- Arrows -->
  <!-- Sidecar -> OpenEMR (FHIR reads) -->
  <line x1="520" y1="190" x2="384" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="452" y="178" font-size="13" fill="#475569" text-anchor="middle">FHIR R4 reads · OAuth2 / SMART</text>

  <!-- Panel -> Sidecar -->
  <line x1="364" y1="290" x2="516" y2="252" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="446" y="286" font-size="13" fill="#475569" text-anchor="middle">HTTPS · patient-bound</text>
  <text x="446" y="303" font-size="13" fill="#475569" text-anchor="middle">launch token</text>

  <!-- OpenEMR -> BullMQ (check-in event) -->
  <path d="M 230 380 L 230 448 L 470 448 L 470 486" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="438" font-size="13" fill="#475569">check-in event → enqueue preparation</text>

  <!-- BullMQ -> Sidecar (workers) -->
  <line x1="580" y1="490" x2="640" y2="304" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="655" y="410" font-size="13" fill="#475569">workers run prep</text>

  <!-- Sidecar -> Postgres -->
  <line x1="560" y1="300" x2="280" y2="486" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="390" font-size="13" fill="#475569">typed facts + provenance</text>

  <!-- Sidecar -> Object storage -->
  <line x1="770" y1="300" x2="825" y2="486" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="880" y="400" font-size="13" fill="#475569">pre-selected scans</text>

  <!-- Sidecar -> Langfuse -->
  <path d="M 690 300 L 690 640 L 664 700" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="712" y="640" font-size="13" fill="#475569">traces (correlation IDs)</text>

  <!-- Sidecar <-> Anthropic -->
  <line x1="844" y1="210" x2="1116" y2="210" stroke="#15803d" stroke-width="2.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="980" y="196" font-size="13" font-weight="bold" fill="#15803d" text-anchor="middle">BAA-covered TLS</text>
  <text x="980" y="232" font-size="13" fill="#15803d" text-anchor="middle">the only boundary crossing</text>

  <!-- Callout -->
  <text x="80" y="792" font-size="14" font-style="italic" fill="#475569">The fact store is a view, not a second source of truth — rollback = redeploy previous image; worst case, wipe and re-prepare. Safe by construction.</text>
</svg>
