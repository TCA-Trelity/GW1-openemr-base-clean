# Live smoke probe (S1.10): GitHub runners can reach the public URLs (the dev
# session cannot), so this workflow is the session's eyes on prod. With a
# sidecar_url input it also runs the full end-to-end: trigger a real prep for
# the seeded patient and assert the gate-checked brief exists.
name: Live smoke

on:
  workflow_dispatch:
    inputs:
      sidecar_url:
        description: 'Sidecar base URL; clear this field to run the EHR-only probe'
        required: false
        default: 'https://enchanting-mercy-production-5d32.up.railway.app'
  # Editing this workflow re-runs it (the session cannot call workflow_dispatch —
  # the GitHub App token lacks actions:write — but it can push).
  push:
    paths:
      - '.github/workflows/live-smoke.yml'

env:
  # On push there are no inputs; fall back to the production sidecar.
  SIDECAR_URL: ${{ github.event_name == 'push' && 'https://enchanting-mercy-production-5d32.up.railway.app' || inputs.sidecar_url }}

# One probe at a time: pushes land on several branches at once and the e2e run
# triggers a real prep; queue instead of stampeding the live service (probe).
concurrency:
  group: live-smoke
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe EHR login page and FHIR endpoint
        env:
          APP_URL: https://gw1-openemr-base-clean-production.up.railway.app
        run: |
          set -uo pipefail
          fail=0

          echo "== GET / (login page) =="
          code=$(curl -s -o /tmp/login.html -w '%{http_code}' -L --max-time 30 "$APP_URL/")
          echo "HTTP $code"
          if [ "$code" = "200" ] && grep -qi "openemr\|login" /tmp/login.html; then
            echo "login page: OK"
          else
            echo "login page: FAILED"; head -c 400 /tmp/login.html || true; fail=1
          fi

          echo "== GET /apis/default/fhir/metadata (capability statement) =="
          code=$(curl -s -o /tmp/meta.json -w '%{http_code}' --max-time 30 "$APP_URL/apis/default/fhir/metadata")
          echo "HTTP $code"
          if [ "$code" = "200" ] && grep -q '"resourceType" *: *"CapabilityStatement"' /tmp/meta.json; then
            echo "fhir metadata: OK ($(wc -c < /tmp/meta.json) bytes)"
          else
            echo "fhir metadata: FAILED"; head -c 400 /tmp/meta.json || true; fail=1
          fi

          exit $fail

      - name: Sidecar readiness and end-to-end prep
        if: ${{ env.SIDECAR_URL != '' }}
        run: |
          set -uo pipefail

          echo "== GET /ready =="
          code=$(curl -s -o /tmp/ready.json -w '%{http_code}' --max-time 30 "$SIDECAR_URL/ready")
          echo "HTTP $code"; cat /tmp/ready.json | head -c 600; echo
          [ "$code" = "200" ] || { echo "sidecar not ready"; exit 1; }

          echo "== Auth posture probe + token bootstrap =="
          # Adaptive: with AUTH_MODE=enforced the smoke PROVES the 401/403/200 chain;
          # with auth off it runs tokenless exactly as before.
          unauth=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SIDECAR_URL/api/overview/margaret-chen")
          TOKEN=$(curl -s -X POST "$SIDECAR_URL/api/dev-login" -H 'content-type: application/json' \
            -d '{"role":"physician","patient":"margaret-chen"}' | jq -r '.access_token // empty')
          AUTH=()
          if [ -n "$TOKEN" ]; then AUTH=(-H "Authorization: Bearer $TOKEN"); echo "dev-login token minted (physician @ margaret-chen)"; else echo "dev-login disabled — tokenless"; fi
          if [ "$unauth" = "401" ]; then
            echo "enforcement ON: unauthenticated overview -> 401 OK"
            [ -n "$TOKEN" ] || { echo "AUTH_MODE enforced but dev-login disabled — smoke cannot authenticate"; exit 1; }
            cross=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/overview/william-thompson")
            [ "$cross" = "403" ] && echo "cross-patient block: margaret-bound token vs william -> 403 OK" \
              || { echo "cross-patient expected 403, got $cross"; exit 1; }
          else
            echo "enforcement OFF: unauthenticated overview -> $unauth (operator choice; not a failure)"
          fi

          echo "== POST /api/ehr-sync/margaret-chen (live EHR link) =="
          code=$(curl -s -X POST -o /tmp/sync.json -w '%{http_code}' --max-time 60 "${AUTH[@]}" "$SIDECAR_URL/api/ehr-sync/margaret-chen")
          echo "HTTP $code"; head -c 600 /tmp/sync.json; echo
          case "$code" in
            200) echo "ehr-sync OK" ;;
            409) echo "ehr-sync: clean no-op (patient not linked — reseed to restore linkage)" ;;
            *) echo "ehr-sync FAILED — the body above names the failing dependency"; exit 1 ;;
          esac

          echo "== Deterministic layer: patients, overview, scan bytes =="
          curl -s --max-time 30 "$SIDECAR_URL/api/patients" -o /tmp/patients.json
          jq -e '.patients | length >= 2' /tmp/patients.json >/dev/null \
            && echo "patients: $(jq '.patients | length' /tmp/patients.json) OK" || { echo "patients FAILED"; cat /tmp/patients.json; exit 1; }
          curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/overview/margaret-chen" -o /tmp/overview.json
          jq -e '.medication_risk_flags | length > 0' /tmp/overview.json >/dev/null \
            && echo "overview med-risk flags OK" || { echo "overview med-risk FAILED"; exit 1; }
          jq -e '.contradictions | length > 0' /tmp/overview.json >/dev/null \
            && echo "overview contradictions OK" || { echo "overview contradictions FAILED"; exit 1; }
          key=$(jq -r '.images[0].storage_key // empty' /tmp/overview.json)
          [ -n "$key" ] || { echo "images missing storage_key — reseed needed"; exit 1; }
          ctype=$(curl -s -o /dev/null -w '%{content_type}' --max-time 30 "$SIDECAR_URL/api/images/$key")
          case "$ctype" in image/*) echo "scan bytes OK ($key, $ctype)";; *) echo "scan fetch FAILED ($ctype)"; exit 1;; esac

          echo "== POST /api/prep/margaret-chen =="
          code=$(curl -s -X POST -o /tmp/prep.json -w '%{http_code}' --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/prep/margaret-chen")
          echo "HTTP $code"; cat /tmp/prep.json; echo
          [ "$code" = "202" ] || { echo "prep trigger failed"; exit 1; }

          echo "== Poll GET /api/brief/margaret-chen (up to 8 min) =="
          for i in $(seq 1 48); do
            code=$(curl -s -o /tmp/brief.json -w '%{http_code}' --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/brief/margaret-chen")
            if [ "$code" = "200" ]; then break; fi
            echo "attempt $i: HTTP $code — waiting 10s (LLM extraction in flight)"; sleep 10
          done
          echo "== Prep run status (stage shows where a failed run died) =="
          curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/prep-runs/margaret-chen" | jq '.runs[:3]' || true
          [ "$code" = "200" ] || { echo "brief never appeared"; exit 1; }

          echo "== Brief assertions =="
          jq -e '.content.gate_metrics.citationsFailed == 0' /tmp/brief.json >/dev/null \
            && echo "gate: 0 failed citations OK" || { echo "gate metrics FAILED"; jq '.content.gate_metrics' /tmp/brief.json; exit 1; }
          jq -e '.content.medication_risk_flags | length > 0' /tmp/brief.json >/dev/null \
            && echo "med-risk flags present OK" || { echo "med-risk flags MISSING"; exit 1; }
          jq -e '.content.imaging.hcq_progression.alert_level != null' /tmp/brief.json >/dev/null \
            && echo "imaging analytics present OK" || { echo "imaging block MISSING"; exit 1; }
          jq -e '.content.contradiction_alerts | length > 0' /tmp/brief.json >/dev/null \
            && echo "contradiction alerts present OK" || echo "note: no contradiction alerts (extraction may not have surfaced them)"

          echo "== Brief summary =="
          jq '{prepared_at: .prepared_at, urgency: .content.urgency, discussion_points: (.content.key_discussion_points | length), facts: (.content.facts_by_type | to_entries | map({(.key): (.value | length)}) | add), gate: .content.gate_metrics}' /tmp/brief.json
