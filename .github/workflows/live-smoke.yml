# Live smoke probe (S1.10): GitHub runners can reach the public URLs (the dev
# session cannot), so this workflow is the session's eyes on prod. With a
# sidecar_url input it also runs the full end-to-end: trigger a real prep for
# the seeded patient and assert the gate-checked brief exists.
# W2 leg (H.4, merged-plan Track 1): upload a fixture lab PDF → staged
# ingestion to 'complete' → grounding summary → stored-file (overlay source)
# → guideline evidence search → cited chat evidence turn. Prints the upload's
# x-correlation-id for the Langfuse eyeball (USER-ACTIONS item 10).
name: Live smoke

on:
  workflow_dispatch:
    inputs:
      sidecar_url:
        description: 'Sidecar base URL; clear this field to run the EHR-only probe'
        required: false
        default: 'https://enchanting-mercy-production-5d32.up.railway.app'
  # Editing this workflow re-runs it (the session cannot call workflow_dispatch —
  # the GitHub App token lacks actions:write — but it can push).
  push:
    paths:
      - '.github/workflows/live-smoke.yml'

env:
  # On push there are no inputs; fall back to the production sidecar.
  SIDECAR_URL: ${{ github.event_name == 'push' && 'https://enchanting-mercy-production-5d32.up.railway.app' || inputs.sidecar_url }}

# One probe at a time — pushes land on several branches at once and the e2e run
# triggers a real prep; queue instead of stampeding the live service (gate-fix).
# Deploy-race gotcha: a push that also changes sidecar code starts a Railway
# rebuild, and the cutover kills any prep the smoke just started on the old
# instance (the run dies mid llm_extraction; its prep_run row stays 'running'
# forever, harmlessly — the in-flight dedupe is per-process, not DB-backed).
# Re-kick the smoke after the deploy settles rather than chasing ghosts.
concurrency:
  group: live-smoke
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      # The W2 leg uploads a committed fixture PDF, so it needs the repo.
      - uses: actions/checkout@v4

      - name: Probe EHR login page and FHIR endpoint
        env:
          APP_URL: https://gw1-openemr-base-clean-production.up.railway.app
        run: |
          set -uo pipefail
          fail=0

          echo "== GET / (login page) =="
          code=$(curl -s -o /tmp/login.html -w '%{http_code}' -L --max-time 30 "$APP_URL/")
          echo "HTTP $code"
          if [ "$code" = "200" ] && grep -qi "openemr\|login" /tmp/login.html; then
            echo "login page: OK"
          else
            echo "login page: FAILED"; head -c 400 /tmp/login.html || true; fail=1
          fi

          echo "== GET /apis/default/fhir/metadata (capability statement) =="
          code=$(curl -s -o /tmp/meta.json -w '%{http_code}' --max-time 30 "$APP_URL/apis/default/fhir/metadata")
          echo "HTTP $code"
          if [ "$code" = "200" ] && grep -q '"resourceType" *: *"CapabilityStatement"' /tmp/meta.json; then
            echo "fhir metadata: OK ($(wc -c < /tmp/meta.json) bytes)"
          else
            echo "fhir metadata: FAILED"; head -c 400 /tmp/meta.json || true; fail=1
          fi

          exit $fail

      - name: Sidecar readiness and end-to-end prep
        if: ${{ env.SIDECAR_URL != '' }}
        run: |
          set -uo pipefail

          echo "== GET /ready =="
          code=$(curl -s -o /tmp/ready.json -w '%{http_code}' --max-time 30 "$SIDECAR_URL/ready")
          echo "HTTP $code"; cat /tmp/ready.json | head -c 600; echo
          [ "$code" = "200" ] || { echo "sidecar not ready"; exit 1; }

          echo "== Auth posture probe + token bootstrap =="
          # Adaptive: with AUTH_MODE=enforced the smoke PROVES the 401/403/200 chain;
          # with auth off it runs tokenless exactly as before.
          unauth=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SIDECAR_URL/api/overview/margaret-chen")
          TOKEN=$(curl -s -X POST "$SIDECAR_URL/api/dev-login" -H 'content-type: application/json' \
            -d '{"role":"physician","patient":"margaret-chen"}' | jq -r '.access_token // empty')
          AUTH=()
          if [ -n "$TOKEN" ]; then AUTH=(-H "Authorization: Bearer $TOKEN"); echo "dev-login token minted (physician @ margaret-chen)"; else echo "dev-login disabled — tokenless"; fi
          if [ "$unauth" = "401" ]; then
            echo "enforcement ON: unauthenticated overview -> 401 OK"
            [ -n "$TOKEN" ] || { echo "AUTH_MODE enforced but dev-login disabled — smoke cannot authenticate"; exit 1; }
            cross=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/overview/william-thompson")
            [ "$cross" = "403" ] && echo "cross-patient block: margaret-bound token vs william -> 403 OK" \
              || { echo "cross-patient expected 403, got $cross"; exit 1; }
          else
            echo "enforcement OFF: unauthenticated overview -> $unauth (operator choice; not a failure)"
          fi

          echo "== POST /api/ehr-sync/margaret-chen (live EHR link) =="
          code=$(curl -s -X POST -o /tmp/sync.json -w '%{http_code}' --max-time 60 "${AUTH[@]}" "$SIDECAR_URL/api/ehr-sync/margaret-chen")
          echo "HTTP $code"; head -c 600 /tmp/sync.json; echo
          case "$code" in
            200) echo "ehr-sync OK" ;;
            409) echo "ehr-sync: clean no-op (patient not linked — reseed to restore linkage)" ;;
            *) echo "ehr-sync FAILED — the body above names the failing dependency"; exit 1 ;;
          esac

          echo "== Deterministic layer: patients, overview, scan bytes =="
          curl -s --max-time 30 "$SIDECAR_URL/api/patients" -o /tmp/patients.json
          jq -e '.patients | length >= 2' /tmp/patients.json >/dev/null \
            && echo "patients: $(jq '.patients | length' /tmp/patients.json) OK" || { echo "patients FAILED"; cat /tmp/patients.json; exit 1; }
          curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/overview/margaret-chen" -o /tmp/overview.json
          jq -e '.medication_risk_flags | length > 0' /tmp/overview.json >/dev/null \
            && echo "overview med-risk flags OK" || { echo "overview med-risk FAILED"; exit 1; }
          jq -e '.contradictions | length > 0' /tmp/overview.json >/dev/null \
            && echo "overview contradictions OK" || { echo "overview contradictions FAILED"; exit 1; }
          key=$(jq -r '.images[0].storage_key // empty' /tmp/overview.json)
          [ -n "$key" ] || { echo "images missing storage_key — reseed needed"; exit 1; }
          ctype=$(curl -s -o /dev/null -w '%{content_type}' --max-time 30 "$SIDECAR_URL/api/images/$key")
          case "$ctype" in image/*) echo "scan bytes OK ($key, $ctype)";; *) echo "scan fetch FAILED ($ctype)"; exit 1;; esac

          echo "== POST /api/prep/margaret-chen =="
          # A prior brief may exist; when we start a FRESH prep the poll below must not
          # grade that stale artifact (live gotcha: the old brief 200s immediately).
          before=$(curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/brief/margaret-chen" | jq -r '.prepared_at // empty')
          code=$(curl -s -X POST -o /tmp/prep.json -w '%{http_code}' --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/prep/margaret-chen")
          echo "HTTP $code"; cat /tmp/prep.json; echo
          # 202 = started / already running; 200 reused = a fresh-enough brief already exists
          # (the reuse window is deliberate LLM-spend dedup, not a failure).
          if [ "$code" = "202" ]; then
            echo "prep started (will wait for a brief newer than '${before:-none}')"
          elif [ "$code" = "200" ] && grep -q '"status":"reused"' /tmp/prep.json; then
            echo "prep reused a fresh brief (within the reuse window)"
            before=""
          else
            echo "prep trigger failed"; exit 1
          fi

          echo "== Poll GET /api/brief/margaret-chen (up to 13 min; provenance retries slow prep) =="
          for i in $(seq 1 78); do
            code=$(curl -s -o /tmp/brief.json -w '%{http_code}' --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/brief/margaret-chen")
            if [ "$code" = "200" ] && [ "$(jq -r '.prepared_at // empty' /tmp/brief.json)" != "$before" ]; then break; fi
            echo "attempt $i: HTTP $code — waiting 10s (LLM extraction in flight)"; sleep 10
          done
          echo "== Prep run status (stage shows where a failed run died) =="
          curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/prep-runs/margaret-chen" | jq '.runs[:3]' || true
          [ "$code" = "200" ] && [ "$(jq -r '.prepared_at // empty' /tmp/brief.json)" = "$before" ] && { echo "brief never refreshed past the pre-prep artifact"; exit 1; }
          [ "$code" = "200" ] || { echo "brief never appeared"; exit 1; }

          echo "== Brief assertions =="
          gatefail=0
          jq -e '.content.gate_metrics.citationsFailed == 0' /tmp/brief.json >/dev/null \
            && echo "gate: 0 failed citations OK" || { echo "gate metrics FAILED (diagnostics below; step fails at the end)"; jq '.content.gate_metrics' /tmp/brief.json; gatefail=1; }
          jq -e '.content.medication_risk_flags | length > 0' /tmp/brief.json >/dev/null \
            && echo "med-risk flags present OK" || { echo "med-risk flags MISSING"; exit 1; }
          jq -e '.content.imaging.hcq_progression.alert_level != null' /tmp/brief.json >/dev/null \
            && echo "imaging analytics present OK" || { echo "imaging block MISSING"; exit 1; }
          jq -e '.content.contradiction_alerts | length > 0' /tmp/brief.json >/dev/null \
            && echo "contradiction alerts present OK" || echo "note: no contradiction alerts (extraction may not have surfaced them)"

          echo "== Brief summary =="
          jq '{prepared_at: .prepared_at, urgency: .content.urgency, discussion_points: (.content.key_discussion_points | length), facts: (.content.facts_by_type | to_entries | map({(.key): (.value | length)}) | add), gate: .content.gate_metrics}' /tmp/brief.json

          if [ "$gatefail" = "1" ]; then
            echo "############################################################"
            echo "## GATE-METRICS DIAGNOSTICS (blocked claims on a LIVE prep)"
            echo "## Reasons live in the sidecar server logs, not the API:"
            echo "## Railway -> sidecar service -> Deployments -> View logs,"
            echo "## search 'blockedFacts' near this prep's correlation id:"
            curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/prep-runs/margaret-chen" | jq -r '.runs[0] | "##   correlation_id: \(.correlation_id)  (started \(.started_at))"' || true
            echo "## Known historical pattern: '5 blocked claims per prep, all"
            echo "## from the ehr_import snapshot' (see sidecar/src/prep/sources.ts:60)."
            echo "############################################################"
            exit 1
          fi

      - name: W2 document flow — upload, extraction, grounding, cited evidence turn (H.4)
        if: ${{ !cancelled() && env.SIDECAR_URL != '' }}
        run: |
          set -uo pipefail
          FIXTURE=sidecar/eval/fixtures/documents/renal-panel-clean.pdf
          [ -f "$FIXTURE" ] || { echo "fixture missing at $FIXTURE"; exit 1; }

          echo "== Physician token (write path requires it regardless of AUTH_MODE) =="
          TOKEN=$(curl -s -X POST "$SIDECAR_URL/api/dev-login" -H 'content-type: application/json' \
            -d '{"role":"physician","patient":"margaret-chen"}' | jq -r '.access_token // empty')
          [ -n "$TOKEN" ] || { echo "dev-login disabled — the W2 write path cannot be smoked without it"; exit 1; }
          AUTH=(-H "Authorization: Bearer $TOKEN")

          echo "== POST /api/patients/margaret-chen/documents (multipart lab_pdf) =="
          code=$(curl -s -D /tmp/up.headers -o /tmp/up.json -w '%{http_code}' --max-time 60 "${AUTH[@]}" \
            -F "doc_type=lab_pdf" -F "file=@$FIXTURE;type=application/pdf" \
            "$SIDECAR_URL/api/patients/margaret-chen/documents")
          echo "HTTP $code"; cat /tmp/up.json; echo
          case "$code" in 200|202) : ;; *) echo "upload FAILED"; exit 1 ;; esac
          ING=$(jq -r '.ingestion_id // empty' /tmp/up.json)
          [ -n "$ING" ] || { echo "no ingestion_id in upload response"; exit 1; }
          CORR=$(grep -i '^x-correlation-id:' /tmp/up.headers | tr -d '\r' | awk '{print $2}')
          echo "ingestion: $ING"
          echo "############################################################"
          echo "## LANGFUSE EYEBALL (USER-ACTIONS item 10):"
          echo "## search this trace id: ${CORR:-<x-correlation-id header absent>}"
          echo "############################################################"

          echo "== Poll /api/ingestions/$ING to 'complete' (SLO p95 <= 90 s; byte-identical re-runs dedupe fast) =="
          status=""
          for i in $(seq 1 36); do
            curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/ingestions/$ING" -o /tmp/ing.json || true
            status=$(jq -r '.status // empty' /tmp/ing.json)
            echo "attempt $i: status=$status"
            case "$status" in
              complete) break ;;
              failed_*|blocked_*) echo "ingestion terminal failure:"; cat /tmp/ing.json; exit 1 ;;
            esac
            sleep 5
          done
          [ "$status" = "complete" ] && echo "ingestion complete" || { echo "ingestion never completed"; cat /tmp/ing.json; exit 1; }

          echo "== Grounding + persistence assertions =="
          jq -e '.facts_persisted >= 1' /tmp/ing.json >/dev/null \
            && echo "facts persisted: $(jq '.facts_persisted' /tmp/ing.json) OK" || { echo "no facts persisted"; exit 1; }
          jq -e '.grounding.word_box >= 1' /tmp/ing.json >/dev/null \
            && echo "grounding word_box: $(jq '.grounding.word_box' /tmp/ing.json) OK (tight boxes exist for the overlay)" \
            || { echo "no word_box grounding on the clean fixture"; jq '.grounding' /tmp/ing.json; exit 1; }

          echo "== GET /api/ingestions/$ING/file (the bytes the citation overlay renders) =="
          ctype=$(curl -s -o /tmp/stored.pdf -w '%{content_type}' --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/ingestions/$ING/file")
          case "$ctype" in application/pdf*) echo "stored original OK ($ctype, $(wc -c < /tmp/stored.pdf) bytes)" ;; *) echo "file fetch FAILED ($ctype)"; exit 1 ;; esac

          echo "== Second doc type: intake form (fresh-path or dedupe both prove the pipeline) =="
          INTAKE=sidecar/eval/fixtures/documents/intake-update-clean.pdf
          code=$(curl -s -D /tmp/up2.headers -o /tmp/up2.json -w '%{http_code}' --max-time 60 "${AUTH[@]}" \
            -F "doc_type=intake_form" -F "file=@$INTAKE;type=application/pdf" \
            "$SIDECAR_URL/api/patients/margaret-chen/documents")
          echo "HTTP $code"; cat /tmp/up2.json; echo
          case "$code" in 200|202) : ;; *) echo "intake upload FAILED"; exit 1 ;; esac
          ING2=$(jq -r '.ingestion_id // empty' /tmp/up2.json)
          CORR2=$(grep -i '^x-correlation-id:' /tmp/up2.headers | tr -d '\r' | awk '{print $2}')
          echo "intake ingestion: $ING2 (correlation ${CORR2:-unknown})"
          status2=""
          for i in $(seq 1 36); do
            curl -s --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/ingestions/$ING2" -o /tmp/ing2.json || true
            status2=$(jq -r '.status // empty' /tmp/ing2.json)
            echo "attempt $i: status=$status2"
            case "$status2" in
              complete) break ;;
              failed_*|blocked_*) echo "intake ingestion terminal failure (post-write verification catches silent EHR orphans):"; cat /tmp/ing2.json; exit 1 ;;
            esac
            sleep 5
          done
          [ "$status2" = "complete" ] || { echo "intake ingestion never completed"; cat /tmp/ing2.json; exit 1; }
          jq -e '.facts_persisted >= 1' /tmp/ing2.json >/dev/null \
            && echo "intake facts persisted: $(jq '.facts_persisted' /tmp/ing2.json) OK" || { echo "no intake facts persisted"; exit 1; }

          echo "== POST /api/evidence/search (guideline corpus, same retrieval the chat uses) =="
          curl -s -X POST --max-time 30 "${AUTH[@]}" "$SIDECAR_URL/api/evidence/search" -H 'content-type: application/json' \
            -d '{"q":"hydroxychloroquine screening interval"}' -o /tmp/search.json
          jq -e '(.results // .snippets // []) | length > 0' /tmp/search.json >/dev/null \
            && echo "evidence search: $(jq '(.results // .snippets // []) | length' /tmp/search.json) hits OK" \
            || { echo "evidence search returned nothing"; cat /tmp/search.json | head -c 400; exit 1; }
          echo "rerank_applied: $(jq -r '.rerank_applied // "absent"' /tmp/search.json) (informational — false means Cohere degraded/passthrough)"

          echo "== Chat evidence turn (SSE): should cite guidelines + the uploaded lab =="
          curl -sN -X POST --max-time 90 "${AUTH[@]}" -H 'content-type: application/json' \
            -d '{"message":"What screening interval do our practice protocols recommend for her hydroxychloroquine, given the new eGFR?"}' \
            "$SIDECAR_URL/api/chat/margaret-chen" > /tmp/chat.sse || true
          grep -q '"type":"status"' /tmp/chat.sse \
            && echo "SSE status event seen (evidence path engaged)" \
            || echo "note: no status event (fast path answered — acceptable but unexpected for this question)"
          grep -q '"citations":\[' /tmp/chat.sse || { echo "no citations event in the stream"; tail -c 800 /tmp/chat.sse; exit 1; }
          grep -q 'guideline_evidence' /tmp/chat.sse \
            && echo "guideline citation present OK" || { echo "no guideline_evidence citation"; tail -c 800 /tmp/chat.sse; exit 1; }
          grep -qi 'egfr' /tmp/chat.sse \
            && echo "answer references the eGFR (uploaded lab in play) OK" \
            || echo "note: answer does not mention eGFR verbatim (soft check — read the transcript)"
          echo "== last chat events =="
          tail -c 1200 /tmp/chat.sse; echo
          echo "W2 leg PASSED — correlation id for Langfuse: ${CORR:-unknown}"
