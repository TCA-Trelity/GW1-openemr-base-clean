# Live smoke probe (S1.10): GitHub runners can reach the public URLs (the dev
# session cannot), so this workflow is the session's eyes on prod. With a
# sidecar_url input it also runs the full end-to-end: trigger a real prep for
# the seeded patient and assert the gate-checked brief exists.
name: Live smoke

on:
  workflow_dispatch:
    inputs:
      sidecar_url:
        description: 'Sidecar base URL (e.g. https://sidecar-production-xxxx.up.railway.app); empty = EHR-only probe'
        required: false
        default: ''

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe EHR login page and FHIR endpoint
        env:
          APP_URL: https://gw1-openemr-base-clean-production.up.railway.app
        run: |
          set -uo pipefail
          fail=0

          echo "== GET / (login page) =="
          code=$(curl -s -o /tmp/login.html -w '%{http_code}' -L --max-time 30 "$APP_URL/")
          echo "HTTP $code"
          if [ "$code" = "200" ] && grep -qi "openemr\|login" /tmp/login.html; then
            echo "login page: OK"
          else
            echo "login page: FAILED"; head -c 400 /tmp/login.html || true; fail=1
          fi

          echo "== GET /apis/default/fhir/metadata (capability statement) =="
          code=$(curl -s -o /tmp/meta.json -w '%{http_code}' --max-time 30 "$APP_URL/apis/default/fhir/metadata")
          echo "HTTP $code"
          if [ "$code" = "200" ] && grep -q '"resourceType" *: *"CapabilityStatement"' /tmp/meta.json; then
            echo "fhir metadata: OK ($(wc -c < /tmp/meta.json) bytes)"
          else
            echo "fhir metadata: FAILED"; head -c 400 /tmp/meta.json || true; fail=1
          fi

          exit $fail

      - name: Sidecar readiness and end-to-end prep
        if: ${{ inputs.sidecar_url != '' }}
        env:
          SIDECAR_URL: ${{ inputs.sidecar_url }}
        run: |
          set -uo pipefail

          echo "== GET /ready =="
          code=$(curl -s -o /tmp/ready.json -w '%{http_code}' --max-time 30 "$SIDECAR_URL/ready")
          echo "HTTP $code"; cat /tmp/ready.json | head -c 600; echo
          [ "$code" = "200" ] || { echo "sidecar not ready"; exit 1; }

          echo "== POST /api/prep/margaret-chen =="
          code=$(curl -s -X POST -o /tmp/prep.json -w '%{http_code}' --max-time 30 "$SIDECAR_URL/api/prep/margaret-chen")
          echo "HTTP $code"; cat /tmp/prep.json; echo
          [ "$code" = "202" ] || { echo "prep trigger failed"; exit 1; }

          echo "== Poll GET /api/brief/margaret-chen (up to 8 min) =="
          for i in $(seq 1 48); do
            code=$(curl -s -o /tmp/brief.json -w '%{http_code}' --max-time 30 "$SIDECAR_URL/api/brief/margaret-chen")
            if [ "$code" = "200" ]; then break; fi
            echo "attempt $i: HTTP $code — waiting 10s (LLM extraction in flight)"; sleep 10
          done
          echo "== Prep run status (stage shows where a failed run died) =="
          curl -s --max-time 30 "$SIDECAR_URL/api/prep-runs/margaret-chen" | jq '.runs[:3]' || true
          [ "$code" = "200" ] || { echo "brief never appeared"; exit 1; }

          echo "== Brief assertions =="
          jq -e '.content.gate_metrics.citationsFailed == 0' /tmp/brief.json >/dev/null \
            && echo "gate: 0 failed citations OK" || { echo "gate metrics FAILED"; jq '.content.gate_metrics' /tmp/brief.json; exit 1; }
          jq -e '.content.medication_risk_flags | length > 0' /tmp/brief.json >/dev/null \
            && echo "med-risk flags present OK" || { echo "med-risk flags MISSING"; exit 1; }
          jq -e '.content.imaging.hcq_progression.alert_level != null' /tmp/brief.json >/dev/null \
            && echo "imaging analytics present OK" || { echo "imaging block MISSING"; exit 1; }
          jq -e '.content.contradiction_alerts | length > 0' /tmp/brief.json >/dev/null \
            && echo "contradiction alerts present OK" || echo "note: no contradiction alerts (extraction may not have surfaced them)"

          echo "== Brief summary =="
          jq '{prepared_at: .prepared_at, urgency: .content.urgency, discussion_points: (.content.key_discussion_points | length), facts: (.content.facts_by_type | to_entries | map({(.key): (.value | length)}) | add), gate: .content.gate_metrics}' /tmp/brief.json
