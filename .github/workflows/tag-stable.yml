# Mints grader-checkpoint tags from CI: the dev session's git proxy only accepts
# branch pushes, so tags are created here with the runner's token. Idempotent —
# an existing tag is left untouched. Dispatch with the tag name per RELEASE.md's
# checkpoint flow (the historical hard-coded push trigger minted stable-2026-07-09).
name: Tag stable

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Checkpoint tag name (must match stable-*, e.g. stable-2026-07-12)'
        required: true
        type: string
      ref:
        description: 'Ref to tag (default: main tip)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
      REF: ${{ inputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag the requested ref
        run: |
          case "$TAG" in
            stable-*) ;;
            *) echo "tag must match stable-* (got: $TAG)"; exit 1;;
          esac
          git fetch origin "$REF" -q
          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag already exists — nothing to do"
            exit 0
          fi
          git tag "$TAG" FETCH_HEAD
          git push origin "$TAG"
          echo "tagged $(git rev-parse --short FETCH_HEAD) as $TAG"
