# Sidecar CI — the automated proving ground for the promotion gate (RELEASE.md).
# Runs the full sidecar + panel suites, typecheck, and the production build (the same
# tsc/vite paths the Docker image uses) on every push that touches sidecar/. A green run on
# the working-branch HEAD is the precondition for promoting working -> main. Path-scoped so it
# never runs for pure OpenEMR/PHP changes.
name: Sidecar CI

on:
  push:
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar-ci.yml'
      - '.gitattributes'
  pull_request:
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar-ci.yml'
      - '.gitattributes'
  workflow_dispatch:

concurrency:
  group: sidecar-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Railway builds from the GitHub source archive, which honors .gitattributes
  # export-ignore — actions/checkout does not, so a build broken only in the
  # exported tarball stays invisible to the jobs below. An unanchored `tools/`
  # pattern once dropped sidecar/src/chat/tools/ from every deploy context
  # (phantom TS2307 with green CI). Fail loudly if any committed sidecar file
  # would be missing from the export Railway actually builds.
  export-parity:
    name: export parity (deploy archive == committed tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: git archive ships every committed sidecar file
        run: |
          diff <(git ls-files sidecar | sort) \
               <(git archive HEAD sidecar | tar -t | grep -v '/$' | sort)

  sidecar:
    name: sidecar (test + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build (tsc — the Docker build path)
        run: npm run build

  panel:
    name: panel (test + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar/panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sidecar/panel/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build (vite — the Docker build path)
        run: npm run build
